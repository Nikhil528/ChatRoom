<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen flex items-center justify-center">
    <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
        {% if error %}
            <div class="text-red-500 mb-4">{{ error }}</div>
        {% endif %}
        <form method="post" class="space-y-4">
            <input name="username" placeholder="Username" required class="w-full p-2 rounded border" />
            <input type="password" name="password" placeholder="Password" required class="w-full p-2 rounded border" />
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
        </form>
        <div class="mt-4 text-center">
            <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-300">Toggle 🌙/☀️</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
