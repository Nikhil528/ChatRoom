<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Simple Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="light-mode">
    <div class="login-container">
        <div class="login-box">
            <h1>Simple Chat</h1>
            <p>Login to continue</p>
            
            {% if error %}
            <div class="alert error">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="user1 or user2">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="pass1 or pass2">
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            
            <div class="mode-toggle">
                <button id="modeToggle">🌙 Dark Mode</button>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
