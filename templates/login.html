<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Beautiful Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <div class="login-container">
        <div class="login-box">
            <div class="app-logo">
                <svg viewBox="0 0 24 24" width="48" height="48">
                    <path fill="var(--primary-color)" d="M12,3C6.5,3 2,6.6 2,11C2,13.2 3.1,15.2 4.8,16.5C4.8,17.1 4.4,18.7 2,21C4.4,20.9 6.6,20.5 8.5,19.7C9.6,19.9 10.8,20 12,20C17.5,20 22,16.4 22,12C22,7.6 17.5,4 12,4V3Z" />
                </svg>
                <h1>Beautiful Chat</h1>
            </div>
            
            {% if error %}
            <div class="alert error">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <input type="text" id="username" name="username" required placeholder="Username">
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" required placeholder="Password">
                </div>
                <button type="submit" class="btn login-btn">Login</button>
            </form>
            
            <div class="demo-credentials">
                <p>Try with:</p>
                <p>user1 / pass1 &nbsp;&nbsp; or &nbsp;&nbsp; user2 / pass2</p>
            </div>
            
            <div class="mode-toggle">
                <button id="modeToggle" class="mode-toggle-btn">
                    <span class="moon">🌙</span>
                    <span class="sun">☀️</span>
                    <span class="toggle-ball"></span>
                </button>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
