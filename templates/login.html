<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Modern Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="light-mode">
    <div class="auth-container">
        <div class="auth-card">
            <div class="theme-toggle-container">
                <button id="themeToggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-comments"></i>
                    <span>Modern Chat</span>
                </div>
                <h1>Welcome Back</h1>
                <p>Login to continue to your account</p>
            </div>
            
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <form method="POST" action="/" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        <span>Username</span>
                    </label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        <span>Password</span>
                    </label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="auth-button">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <div class="demo-accounts">
                    <h3>Demo Accounts</h3>
                    <div class="account">
                        <div class="avatar" style="background-color: #4a6fa5;">
                            <span class="emoji-avatar">👩</span>
                        </div>
                        <div class="info">
                            <span>user1 / pass1</span>
                        </div>
                    </div>
                    <div class="account">
                        <div class="avatar" style="background-color: #9c4a9c;">
                            <span class="emoji-avatar">👨</span>
                        </div>
                        <div class="info">
                            <span>user2 / pass2</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
