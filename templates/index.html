<!DOCTYPE html>
<html>
<head>
    <title>Login - Massage Room</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background: #f0f0f0; }
        form { display: inline-block; padding: 20px; background: white; border-radius: 8px; }
        input { margin: 5px; padding: 8px; width: 200px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Login to Video Room</h2>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
    <p>Try <strong>user1 / pass1</strong> or <strong>user2 / pass2</strong></p>
</body>
</html>
