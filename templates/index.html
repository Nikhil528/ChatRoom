<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Video Chat Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --dark-color: #5a5c69;
            --light-color: #f8f9fc;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }
        
        .chat-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            height: 95vh;
            margin-top: 2.5vh;
        }
        
        .video-container {
            background-color: #1a1c23;
            position: relative;
            height: 100%;
            border-radius: 0 0 15px 15px;
            overflow: hidden;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 15px;
            height: calc(100% - 60px);
            overflow-y: auto;
        }
        
        .video-item {
            background: #2c2f3f;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            aspect-ratio: 4/3;
        }
        
        .video-item:hover {
            transform: translateY(-5px);
        }
        
        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }
        
        .user-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px;
            font-size: 14px;
        }
        
        .video-controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        .btn-control {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .chat-sidebar {
            border-left: 1px solid #e3e6f0;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            font-weight: 700;
            text-align: center;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #f8f9fc;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 80%;
        }
        
        .message-sent {
            margin-left: auto;
            background-color: var(--primary-color);
            color: white;
            border-radius: 15px 15px 0 15px;
        }
        
        .message-received {
            background-color: #e9ecef;
            color: #495057;
            border-radius: 15px 15px 15px 0;
        }
        
        .message-content {
            padding: 10px 15px;
        }
        
        .message-sender {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 3px;
        }
        
        .chat-input {
            padding: 15px;
            border-top: 1px solid #e3e6f0;
            background-color: white;
        }
        
        .participants-list {
            padding: 15px;
            background-color: #f8f9fc;
            border-bottom: 1px solid #e3e6f0;
        }
        
        .participant {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .participant:last-child {
            border-bottom: none;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .online {
            background-color: var(--success-color);
        }
        
        .offline {
            background-color: var(--secondary-color);
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: bold;
        }
        
        .floating-room-id {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
        }
        
        .welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 30, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            padding: 20px;
        }
        
        .welcome-content {
            max-width: 500px;
            text-align: center;
        }
        
        .logo {
            font-size: 50px;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .btn-join {
            background: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .btn-join:hover {
            background: #5a6fca;
            transform: translateY(-3px);
        }
        
        .welcome-screen.hidden {
            display: none;
        }
        
        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                margin-top: 0;
                border-radius: 0;
            }
            
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <div class="logo">
                <i class="fas fa-video"></i>
            </div>
            <h1 class="mb-4">Flask Video Chat</h1>
            <p class="lead mb-4">Start a group video call with your friends, family or colleagues in seconds.</p>
            
            <div class="form-group">
                <label for="userName" class="form-label">Your Name</label>
                <input type="text" class="form-control form-control-lg" id="userName" placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="roomId" class="form-label">Room ID</label>
                <input type="text" class="form-control form-control-lg" id="roomId" placeholder="Enter room ID">
                <div class="form-text">Leave blank to create a new room</div>
            </div>
            
            <button class="btn btn-join btn-lg mt-3" id="joinButton">
                <i class="fas fa-video me-2"></i> Join Video Call
            </button>
        </div>
    </div>
    
    <div class="container py-4">
        <div class="row">
            <div class="col-12">
                <div class="chat-container">
                    <div class="row g-0 h-100">
                        <!-- Video Section -->
                        <div class="col-md-8 position-relative">
                            <div class="video-container">
                                <div class="floating-room-id" id="roomIdDisplay">
                                    <i class="fas fa-door-open me-2"></i> Room: <span id="roomIdValue">Loading...</span>
                                </div>
                                <div class="video-grid" id="videoGrid">
                                    <!-- Video elements will be added here dynamically -->
                                </div>
                                <div class="video-controls">
                                    <button class="btn-control btn-danger" id="toggleVideo">
                                        <i class="fas fa-video"></i>
                                    </button>
                                    <button class="btn-control btn-danger" id="toggleAudio">
                                        <i class="fas fa-microphone"></i>
                                    </button>
                                    <button class="btn-control btn-danger" id="leaveCall">
                                        <i class="fas fa-phone-slash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Chat Section -->
                        <div class="col-md-4">
                            <div class="chat-sidebar h-100">
                                <div class="chat-header">
                                    <i class="fas fa-comments me-2"></i> Group Chat
                                </div>
                                
                                <div class="participants-list">
                                    <h6 class="mb-3"><i class="fas fa-users me-2"></i> Participants (<span id="participantCount">0</span>)</h6>
                                    <div id="participantsContainer">
                                        <!-- Participants will be added here dynamically -->
                                    </div>
                                </div>
                                
                                <div class="chat-messages" id="chatMessages">
                                    <!-- Messages will appear here -->
                                </div>
                                
                                <div class="chat-input">
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="messageInput" placeholder="Type your message...">
                                        <button class="btn btn-primary" id="sendMessage">
                                            <i class="fas fa-paper-plane"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const welcomeScreen = document.getElementById('welcomeScreen');
        const userNameInput = document.getElementById('userName');
        const roomIdInput = document.getElementById('roomId');
        const joinButton = document.getElementById('joinButton');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const roomIdValue = document.getElementById('roomIdValue');
        const videoGrid = document.getElementById('videoGrid');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendMessageBtn = document.getElementById('sendMessage');
        const toggleVideoBtn = document.getElementById('toggleVideo');
        const toggleAudioBtn = document.getElementById('toggleAudio');
        const leaveCallBtn = document.getElementById('leaveCall');
        const participantsContainer = document.getElementById('participantsContainer');
        const participantCount = document.getElementById('participantCount');
        
        // State
        let participants = [];
        let localUserName = '';
        let roomId = '';
        let videoEnabled = true;
        let audioEnabled = true;
        
        // Join the call
        joinButton.addEventListener('click', () => {
            localUserName = userNameInput.value.trim() || "Anonymous";
            roomId = roomIdInput.value.trim();
            
            if (!roomId) {
                // Generate a random room ID
                roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            
            // Hide welcome screen
            welcomeScreen.classList.add('hidden');
            
            // Update room ID display
            roomIdValue.textContent = roomId;
            
            // Add local participant
            addParticipant(localUserName, 'You', true);
            
            // Add local video
            addVideoElement(localUserName, getInitials(localUserName), true);
            
            // Simulate other participants joining
            setTimeout(() => {
                addParticipant("Sarah Johnson", "SJ");
                addVideoElement("Sarah Johnson", "SJ");
                addSystemMessage("Sarah Johnson joined the call");
            }, 1000);
            
            setTimeout(() => {
                addParticipant("Mike Rodriguez", "MR");
                addVideoElement("Mike Rodriguez", "MR");
                addSystemMessage("Mike Rodriguez joined the call");
            }, 2000);
            
            setTimeout(() => {
                addParticipant("Emma Parker", "EP");
                addVideoElement("Emma Parker", "EP");
                addSystemMessage("Emma Parker joined the call");
            }, 3000);
            
            // Add welcome message
            addSystemMessage("Welcome to the video chat room! Start chatting with your participants.");
        });
        
        // Add video element to the grid
        function addVideoElement(name, initials, isLocal = false) {
            const videoItem = document.createElement('div');
            videoItem.className = 'video-item';
            
            const videoPlaceholder = document.createElement('div');
            videoPlaceholder.className = 'video-placeholder';
            videoPlaceholder.style.backgroundColor = getRandomColor();
            videoPlaceholder.textContent = initials;
            
            const userName = document.createElement('div');
            userName.className = 'user-name';
            userName.innerHTML = `${name}${isLocal ? ' (You)' : ''}`;
            
            videoItem.appendChild(videoPlaceholder);
            videoItem.appendChild(userName);
            videoGrid.appendChild(videoItem);
            
            // Auto-scroll to show new video
            videoGrid.scrollTop = videoGrid.scrollHeight;
        }
        
        // Add participant to the list
        function addParticipant(name, initials, isLocal = false) {
            const participant = document.createElement('div');
            participant.className = 'participant';
            
            const statusIndicator = document.createElement('div');
            statusIndicator.className = 'status-indicator online';
            
            const userAvatar = document.createElement('div');
            userAvatar.className = 'user-avatar';
            userAvatar.textContent = initials;
            
            const nameElement = document.createElement('div');
            nameElement.textContent = isLocal ? `${name} (You)` : name;
            
            participant.appendChild(statusIndicator);
            participant.appendChild(userAvatar);
            participant.appendChild(nameElement);
            
            participantsContainer.appendChild(participant);
            
            // Update participant count
            participants.push({name, initials, isLocal});
            participantCount.textContent = participants.length;
        }
        
        // Add system message
        function addSystemMessage(message) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message';
            
            const contentEl = document.createElement('div');
            contentEl.className = 'message-content text-center text-muted';
            contentEl.style.fontSize = '0.9em';
            contentEl.textContent = message;
            
            messageEl.appendChild(contentEl);
            chatMessages.appendChild(messageEl);
            
            // Auto-scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Add chat message
        function addChatMessage(sender, message, isLocal = false) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${isLocal ? 'message-sent' : 'message-received'}`;
            
            const senderEl = document.createElement('div');
            senderEl.className = 'message-sender';
            senderEl.textContent = isLocal ? 'You' : sender;
            
            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            contentEl.textContent = message;
            
            messageEl.appendChild(senderEl);
            messageEl.appendChild(contentEl);
            chatMessages.appendChild(messageEl);
            
            // Auto-scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Get initials from name
        function getInitials(name) {
            return name.split(' ')
                .map(word => word[0])
                .join('')
                .toUpperCase()
                .substring(0, 2);
        }
        
        // Generate a random color
        function getRandomColor() {
            const colors = [
                '#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', 
                '#e74a3b', '#6f42c1', '#fd7e14', '#20c997'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // Send message functionality
        sendMessageBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add message to chat
            addChatMessage(localUserName, message, true);
            
            // Clear input
            messageInput.value = '';
            
            // Simulate responses
            simulateResponses(message);
        }
        
        // Simulate responses from other participants
        function simulateResponses(message) {
            const responses = [
                { sender: "Sarah Johnson", delay: 1500, text: "That's a good point." },
                { sender: "Mike Rodriguez", delay: 3000, text: "I agree with that." },
                { sender: "Emma Parker", delay: 4500, text: "Let me look into that." }
            ];
            
            // Only respond to certain messages
            if (message.toLowerCase().includes('hello') || message.toLowerCase().includes('hi')) {
                setTimeout(() => {
                    addChatMessage("Sarah Johnson", "Hello there!");
                }, 1000);
                
                setTimeout(() => {
                    addChatMessage("Mike Rodriguez", "Hi everyone!");
                }, 2000);
            }
            else if (message.toLowerCase().includes('question')) {
                setTimeout(() => {
                    addChatMessage("Emma Parker", "I can answer that question.");
                }, 1500);
            }
            else if (Math.random() > 0.5) {
                const response = responses[Math.floor(Math.random() * responses.length)];
                setTimeout(() => {
                    addChatMessage(response.sender, response.text);
                }, response.delay);
            }
        }
        
        // Toggle video
        toggleVideoBtn.addEventListener('click', () => {
            videoEnabled = !videoEnabled;
            toggleVideoBtn.innerHTML = videoEnabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
            toggleVideoBtn.classList.toggle('btn-danger', !videoEnabled);
            toggleVideoBtn.classList.toggle('btn-secondary', videoEnabled);
        });
        
        // Toggle audio
        toggleAudioBtn.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            toggleAudioBtn.innerHTML = audioEnabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
            toggleAudioBtn.classList.toggle('btn-danger', !audioEnabled);
            toggleAudioBtn.classList.toggle('btn-secondary', audioEnabled);
        });
        
        // Leave call
        leaveCallBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to leave the call?")) {
                // Redirect to welcome screen
                welcomeScreen.classList.remove('hidden');
                videoGrid.innerHTML = '';
                participantsContainer.innerHTML = '';
                chatMessages.innerHTML = '';
                participants = [];
                participantCount.textContent = '0';
                roomIdValue.textContent = 'Loading...';
                
                // Reset controls
                videoEnabled = true;
                audioEnabled = true;
                toggleVideoBtn.innerHTML = '<i class="fas fa-video"></i>';
                toggleAudioBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                toggleVideoBtn.classList.remove('btn-secondary');
                toggleVideoBtn.classList.add('btn-danger');
                toggleAudioBtn.classList.remove('btn-secondary');
                toggleAudioBtn.classList.add('btn-danger');
            }
        });
        
        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            // Add system message
            addSystemMessage("Welcome! Join a room to start video chatting.");
        });
    </script>
</body>
</html>
