<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | {{ username }}</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #007bff;
            --danger: #f44336;
            --text: #333;
            --light: #f5f5f5;
            --white: #ffffff;
            --gray: #495057;
            --sent-msg: #dcf8c6;
            --received-msg: #ffffff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--light);
            color: var(--text);
        }
        
        .header {
            background: var(--primary);
            color: var(--white);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .user-info {
            font-size: 14px;
        }
        
        .user-info a {
            color: var(--white);
            text-decoration: none;
            margin-left: 10px;
        }
        
        .video-container {
            height: 10vh;
            min-height: 80px;
            display: flex;
            background: #000;
            position: relative;
        }
        
        .video-frame {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        .video-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-controls {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        
        .video-controls button {
            padding: 5px 10px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        
        #startCallBtn {
            background: var(--primary);
            color: var(--white);
        }
        
        #endCallBtn {
            background: var(--danger);
            color: var(--white);
            display: none;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            word-break: break-word;
            font-size: 14px;
        }
        
        .sent {
            align-self: flex-end;
            background: var(--sent-msg);
            border-bottom-right-radius: 4px;
        }
        
        .received {
            align-self: flex-start;
            background: var(--received-msg);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
        
        .msg-header {
            font-size: 0.7em;
            color: var(--gray);
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        
        .input-area {
            display: flex;
            padding: 8px;
            background: var(--white);
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }
        
        #messageInput {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 15px;
            outline: none;
            font-size: 14px;
        }
        
        #sendBtn {
            background: var(--secondary);
            color: var(--white);
            margin-left: 8px;
            padding: 8px 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-display {
            position: absolute;
            bottom: 5px;
            left: 5px;
            color: white;
            font-size: 10px;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Video Chat</h2>
        <div class="user-info">
            <strong>{{ username }}</strong>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="video-container">
        <div class="video-frame">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="user-display">You</div>
        </div>
        <div class="video-frame">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="user-display">Partner</div>
        </div>
        <div class="video-controls">
            <button id="startCallBtn">Start Call</button>
            <button id="endCallBtn">End Call</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <!-- Messages appear here -->
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const username = "{{ username }}";
        let localStream;
        
        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startCallBtn = document.getElementById('startCallBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            setInterval(loadMessages, 2000);
        });
        
        // Message Functions
        function loadMessages() {
            fetch("/get_messages")
                .then(response => response.json())
                .then(messages => {
                    chatContainer.innerHTML = '';
                    messages.forEach(msg => {
                        const isSent = msg.sender === username;
                        const msgDiv = document.createElement('div');
                        msgDiv.className = isSent ? 'message sent' : 'message received';
                        
                        msgDiv.innerHTML = `
                            <div class="msg-header">
                                <strong>${msg.sender}</strong>
                                <span>${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        `;
                        
                        chatContainer.appendChild(msgDiv);
                    });
                    
                    // Auto-scroll if near bottom
                    if (chatContainer.scrollTop > chatContainer.scrollHeight - chatContainer.clientHeight - 100) {
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }
                });
        }
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            fetch("/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to send');
                messageInput.value = '';
                loadMessages();
            })
            .catch(error => {
                console.error("Error:", error);
            });
        }
        
        // Video Call Functions
        async function startVideoCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 160, height: 120 }, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
                startCallBtn.style.display = 'none';
                endCallBtn.style.display = 'block';
            } catch (error) {
                console.error("Error accessing media:", error);
            }
        }
        
        function endVideoCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }
            startCallBtn.style.display = 'block';
            endCallBtn.style.display = 'none';
        }
        
        // Event Listeners
        startCallBtn.addEventListener('click', startVideoCall);
        endCallBtn.addEventListener('click', endVideoCall);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
    </script>
</body>
</html>
