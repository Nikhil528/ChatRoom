<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chat Room</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='Style.css') }}"
        />
        <style>
            .video-container {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-bottom: 20px;
            }
            .video-frame {
                border: 2px solid #ddd;
                border-radius: 8px;
                overflow: hidden;
                width: 48%;
                min-width: 300px;
                background: #f5f5f5;
            }
            .video-frame video {
                width: 100%;
                background: #000;
            }
            .video-header {
                padding: 8px;
                background: #e0e0e0;
                font-weight: bold;
                text-align: center;
            }
            .video-controls {
                display: flex;
                justify-content: center;
                gap: 15px;
                margin: 15px 0;
            }
            .video-controls button {
                padding: 8px 15px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                background: #4CAF50;
                color: white;
            }
            .video-controls button:hover {
                background: #45a049;
            }
            .video-controls button.end-call {
                background: #f44336;
            }
            .video-controls button.end-call:hover {
                background: #d32f2f;
            }
        </style>
    </head>
    <body class="chat-page">
        <header>
            <h1>I ❤️ U</h1>
            <div class="user-info">
                Logged in as: <strong>{{ username }}</strong>
                <a href="/logout">Logout</a>
            </div>
        </header>

        <!-- Video Call Section -->
        <div class="video-container" id="videoContainer">
            <div class="video-frame">
                <div class="video-header">You ({{ username }})</div>
                <video id="view1" autoplay playsinline></video>
            </div>
            <div class="video-frame">
                <div class="video-header">Partner</div>
                <video id="view2" autoplay playsinline></video>
            </div>
        </div>

        <div class="video-controls">
            <button id="startCallBtn">Start Video Call</button>
            <button id="endCallBtn" class="end-call" disabled>End Call</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <!-- Messages will appear here -->
        </div>

        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="Type your message..."
            />
            <button onclick="sendMessage()">Send</button>
        </div>

        <script>
            const username = "{{ username }}";
            let localStream;
            let peerConnection;

            // Video call elements
            const view1 = document.getElementById('view1');
            const view2 = document.getElementById('view2');
            const startCallBtn = document.getElementById('startCallBtn');
            const endCallBtn = document.getElementById('endCallBtn');

            // Video call event listeners
            startCallBtn.addEventListener('click', startVideoCall);
            endCallBtn.addEventListener('click', endVideoCall);

            function startVideoCall() {
                startCallBtn.disabled = true;
                endCallBtn.disabled = false;
                
                // Get user media (camera and microphone)
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(stream => {
                        localStream = stream;
                        view1.srcObject = stream;
                        
                        // Here you would typically initialize WebRTC peer connection
                        // and connect to the other user
                        // This is a simplified example
                        
                        // Simulate remote stream (in a real app, this would come from the other peer)
                        // view2.srcObject = remoteStream;
                        
                        console.log("Video call started");
                    })
                    .catch(error => {
                        console.error("Error accessing media devices:", error);
                        startCallBtn.disabled = false;
                    });
            }

            function endVideoCall() {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    view1.srcObject = null;
                }
                
                if (view2.srcObject) {
                    view2.srcObject = null;
                }
                
                startCallBtn.disabled = false;
                endCallBtn.disabled = true;
                
                console.log("Video call ended");
            }

            function loadMessages() {
                fetch("/get_messages")
                    .then((response) => response.json())
                    .then((messages) => {
                        const container =
                            document.getElementById("chatContainer");
                        container.innerHTML = "";

                        messages.forEach((msg) => {
                            const msgDiv = document.createElement("div");
                            msgDiv.className =
                                msg.sender === username
                                    ? "message sent"
                                    : "message received";
                            msgDiv.innerHTML = `
                            <div class="msg-header">
                                <strong>${msg.sender}</strong>
                                <span>${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        `;
                            container.appendChild(msgDiv);
                        });
                        container.scrollTop = container.scrollHeight;
                    });
            }

            function sendMessage() {
                const input = document.getElementById("messageInput");
                const message = input.value.trim();

                if (message) {
                    fetch("/send", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message }),
                    }).then(() => {
                        input.value = "";
                        loadMessages();
                    });
                }
            }

            // Load messages every 2 seconds
            setInterval(loadMessages, 2000);
            window.onload = loadMessages;

            // Send message on Enter key
            document
                .getElementById("messageInput")
                .addEventListener("keypress", (e) => {
                    if (e.key === "Enter") sendMessage();
                });
        </script>
    </body>
</html>
