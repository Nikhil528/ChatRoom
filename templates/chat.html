<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Beautiful Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="light-mode">
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-content">
                <div class="user-profile">
                    <img src="{{ avatar }}" alt="Profile" class="profile-avatar">
                    <div class="user-info">
                        <span class="username">{{ display_name }}</span>
                        <span class="status">Online</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="searchBtn">
                        <i class="fas fa-search"></i>
                    </button>
                    <a href="/logout" class="btn-icon logout-btn">
                        <i class="fas fa-sign-out-alt"></i>
                    </a>
                </div>
            </div>
        </header>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be loaded here -->
        </div>
        
        <div class="reply-preview" id="replyPreview">
            <!-- Reply preview will appear here -->
        </div>
        
        <div class="chat-input">
            <button class="btn-icon emoji-btn">
                <i class="far fa-smile"></i>
            </button>
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
            <button id="sendButton" class="btn send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        
        <div class="mode-toggle">
            <button id="modeToggle" class="mode-toggle-btn">
                <span class="moon">🌙</span>
                <span class="sun">☀️</span>
                <span class="toggle-ball"></span>
            </button>
        </div>
    </div>
    
    <script>
        const currentUser = {
            username: "{{ username }}",
            displayName: "{{ display_name }}",
            avatar: "{{ avatar }}",
            color: "{{ color }}"
        };
    </script>
    <script src="/static/script.js"></script>
</body>
</html>
