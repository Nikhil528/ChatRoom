<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        header {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            text-align: center;
            flex-shrink: 0;
        }

        .user-info {
            background: #495057;
            padding: 8px;
            color: white;
            text-align: right;
            font-size: 14px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 10px;
            gap: 10px;
        }

        .video-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1;
        }

        .video-frame {
            flex: 1 1 45%;
            min-width: 250px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-frame video {
            width: 100%;
            height: 100%;
            background: #000;
            flex-grow: 1;
        }

        .video-header {
            padding: 8px;
            background: #e0e0e0;
            font-weight: bold;
            text-align: center;
            flex-shrink: 0;
        }

        .video-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            background: #fff;
            flex-shrink: 0;
        }

        .chat-section {
            width: 350px;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            word-break: break-word;
        }

        .sent {
            background: #d4edda;
            margin-left: 20%;
        }

        .received {
            background: #f8f9fa;
            margin-right: 20%;
        }

        .msg-header {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }

        #messageInput {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #sendBtn {
            background: #007bff;
            color: white;
            margin-left: 10px;
        }

        #startCallBtn {
            background: #4CAF50;
            color: white;
        }

        #endCallBtn {
            background: #f44336;
            color: white;
        }

        .user-list {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-left: 10px;
            width: 200px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .user-list h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        #userList {
            list-style: none;
            padding: 0;
        }

        #userList li {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            
            .video-section {
                width: 100%;
            }
            
            .chat-section {
                width: 100%;
                height: 300px;
            }
            
            .user-list {
                width: 100%;
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Video Chat App</h1>
        <div class="user-info">
            Logged in as: <strong>{{ username }}</strong> | 
            <a href="/logout" style="color: white;">Logout</a>
        </div>
    </header>

    <div class="main-container">
        <div class="video-section">
            <div class="video-container">
                <div class="video-frame">
                    <div class="video-header">You ({{ username }})</div>
                    <video id="localVideo" autoplay playsinline muted></video>
                </div>
                <div class="video-frame">
                    <div class="video-header">Partner</div>
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
            </div>
            <div class="video-controls">
                <button id="startCallBtn">Start Call</button>
                <button id="endCallBtn" disabled>End Call</button>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-container" id="chatContainer">
                <!-- Messages appear here -->
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message...">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="user-list">
            <h3>Online Users</h3>
            <ul id="userList"></ul>
        </div>
    </div>

    <script>
        const username = "{{ username }}";
        let localStream;

        // DOM elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startCallBtn = document.getElementById('startCallBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const userList = document.getElementById('userList');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            loadUsers();
            setInterval(loadMessages, 2000);
            setInterval(loadUsers, 5000);
            
            // Auto-scroll chat to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        // Message functions
        function loadMessages() {
            fetch("/get_messages")
                .then(response => response.json())
                .then(messages => {
                    chatContainer.innerHTML = '';
                    messages.forEach(msg => {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = msg.sender === username ? 'message sent' : 'message received';
                        msgDiv.innerHTML = `
                            <div class="msg-header">
                                <strong>${msg.sender}</strong>
                                <span>${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        `;
                        chatContainer.appendChild(msgDiv);
                    });
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                })
                .catch(error => console.error("Error loading messages:", error));
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            fetch("/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to send');
                messageInput.value = '';
                loadMessages();
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Failed to send message");
            });
        }

        // User list functions
        function loadUsers() {
            fetch("/get_users")
                .then(response => response.json())
                .then(users => {
                    userList.innerHTML = users
                        .filter(user => user !== username)
                        .map(user => `<li>${user}</li>`)
                        .join('');
                });
        }

        // Video call functions
        startCallBtn.addEventListener('click', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
                startCallBtn.disabled = true;
                endCallBtn.disabled = false;
            } catch (error) {
                console.error("Error accessing media:", error);
                alert("Could not access camera/microphone");
            }
        });

        endCallBtn.addEventListener('click', () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject = null;
            }
            startCallBtn.disabled = false;
            endCallBtn.disabled = true;
        });

        // Send message on Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
