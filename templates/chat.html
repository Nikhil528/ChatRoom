<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flax Chat | {{ name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/flaxcss@latest/dist/flax.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Styles remain the same as previous version */
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Chat Page -->
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="user-avatar" id="currentUserAvatar">{{ avatar }}</div>
                <div class="user-info">
                    <h2 id="currentUserName">{{ name }}</h2>
                    <p id="connectionStatus">Connecting...</p>
                </div>
            </div>
            <div class="chat-header-actions">
                <button class="btn-icon" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be added here dynamically -->
        </div>
        
        <div class="chat-input-area">
            <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
            <button class="send-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Initialize with user data from Flask
        const currentUser = {
            username: "{{ username }}",
            name: "{{ name }}",
            avatar: "{{ avatar }}"
        };
        
        // Initialize chat
        initChat(currentUser);
    </script>
</body>
</html>
