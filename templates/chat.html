<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flax Chat - {{ username }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --primary-color: #7e57c2;
            --primary-light: #b085f5;
            --primary-dark: #4d2c91;
            --light-bg: #f5f7fb;
            --light-text: #333333;
            --light-card: #ffffff;
            --light-border: #e0e0e0;
            --dark-bg: #121212;
            --dark-text: #e0e0e0;
            --dark-card: #1e1e1e;
            --dark-border: #333333;
            --user1-color: #ff6b6b;
            --user2-color: #4dabf7;
            --success: #51cf66;
            --error: #ff6b6b;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--light-bg);
            color: var(--light-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--light-card);
            border: 2px solid var(--light-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--light-text);
            z-index: 100;
        }

        .dark-mode .theme-toggle {
            background: var(--dark-card);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--light-card);
            border-radius: 0;
            overflow: hidden;
        }

        .dark-mode .chat-container {
            background-color: var(--dark-card);
        }

        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .chat-header h2 {
            font-size: 1.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .user1-avatar {
            background-color: var(--user1-color);
        }

        .user2-avatar {
            background-color: var(--user2-color);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sent {
            align-self: flex-end;
            background-color: var(--primary-light);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .received {
            align-self: flex-start;
            background-color: var(--light-border);
            color: var(--light-text);
            border-bottom-left-radius: 5px;
        }

        .dark-mode .received {
            background-color: var(--dark-border);
            color: var(--dark-text);
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 5px;
            text-align: right;
            opacity: 0.8;
        }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 2px solid var(--light-border);
            background-color: var(--light-card);
        }

        .dark-mode .chat-input-area {
            border-top-color: var(--dark-border);
            background-color: var(--dark-card);
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--light-border);
            border-radius: 30px;
            font-size: 1rem;
            background-color: transparent;
            color: var(--light-text);
        }

        .dark-mode .message-input {
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .send-btn:hover {
            background-color: var(--primary-dark);
        }

        .status-indicator {
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: center;
            padding: 5px;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .container {
                height: 100vh;
            }
            
            .chat-header {
                padding: 15px;
            }
            
            .message {
                max-width: 85%;
            }
            
            .chat-input-area {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }
            
            .user-info span {
                display: none;
            }
        }
    </style>
</head>
<body class="light-mode">
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="container">
        <!-- Chat Interface -->
        <div class="chat-container">
            <div class="chat-header">
                <h2>Direct Chat</h2>
                <div class="user-info">
                    <div class="user-avatar {% if username == 'user1' %}user1-avatar{% else %}user2-avatar{% endif %}" 
                         id="currentUserAvatar">
                         {{ username[0]|upper }}
                    </div>
                    <span id="currentUsername">{{ user_info.name }}</span>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                {% for message in messages %}
                <div class="message {% if message.sender == username %}sent{% else %}received{% endif %}">
                    <div>{{ message.text }}</div>
                    <div class="message-time">
                        {{ message.sender_name }} • {{ message.timestamp.split(' ')[1][:5] }}
                    </div>
                </div>
                {% endfor %}
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="message-input" id="messageInput" placeholder="Type your message...">
                <button class="send-btn" id="sendButton">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const themeToggle = document.getElementById('themeToggle');
        const currentUser = "{{ username }}";
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        
        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = themeToggle.querySelector('i');
            if (document.body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
            
            // Save theme preference
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
        
        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.querySelector('i').classList.remove('fa-moon');
            themeToggle.querySelector('i').classList.add('fa-sun');
        }
        
        // Initialize Socket.IO
        const socket = io();
        
        // Handle incoming messages
        socket.on('receive_message', (data) => {
            addMessage(data.sender, data.text, data.timestamp, data.sender_name);
        });
        
        // Handle user status updates
        socket.on('user_status', (data) => {
            if (data.user !== currentUser) {
                const statusEl = document.createElement('div');
                statusEl.className = 'status-indicator';
                statusEl.textContent = `${data.user} is now ${data.status} at ${data.timestamp}`;
                chatMessages.appendChild(statusEl);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        });
        
        // Send message functionality
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                socket.emit('send_message', {
                    message: message
                });
                messageInput.value = '';
            }
        }
        
        function addMessage(sender, text, timestamp, sender_name) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            
            if (sender === currentUser) {
                messageDiv.classList.add('sent');
            } else {
                messageDiv.classList.add('received');
            }
            
            const timeOnly = timestamp.split(' ')[1].substring(0, 5);
            
            messageDiv.innerHTML = `
                <div>${text}</div>
                <div class="message-time">${sender_name} • ${timeOnly}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Auto focus on input
        messageInput.focus();
    </script>
</body>
</html>
