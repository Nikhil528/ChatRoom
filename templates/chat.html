<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat | {{ username }}</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #007bff;
            --danger: #f44336;
            --text: #333;
            --light: #f5f5f5;
            --white: #ffffff;
            --gray: #495057;
            --sent-msg: #dcf8c6;
            --received-msg: #ffffff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            background: var(--light);
            color: var(--text);
        }
        
        .header {
            background: var(--primary);
            color: var(--white);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            height: 50px;
        }
        
        .header h2 {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-info {
            font-size: 13px;
            white-space: nowrap;
        }
        
        .user-info a {
            color: var(--white);
            text-decoration: none;
            margin-left: 8px;
            font-size: 13px;
        }
        
        .video-container {
            height: 80px;
            background: #000;
            display: flex;
            position: relative;
            flex-shrink: 0;
        }
        
        .video-frame {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        .video-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-controls {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        .video-controls button {
            padding: 4px 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            height: 24px;
        }
        
        #startCallBtn {
            background: var(--primary);
            color: var(--white);
            display: block;
        }
        
        #endCallBtn {
            background: var(--danger);
            color: var(--white);
            display: none;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }
        
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.3;
        }
        
        .sent {
            align-self: flex-end;
            background: var(--sent-msg);
            border-bottom-right-radius: 4px;
        }
        
        .received {
            align-self: flex-start;
            background: var(--received-msg);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        
        .msg-header {
            font-size: 11px;
            color: var(--gray);
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
        }
        
        .msg-text {
            font-size: 14px;
        }
        
        .input-area {
            display: flex;
            padding: 8px;
            background: var(--white);
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }
        
        #messageInput {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 15px;
            outline: none;
            font-size: 14px;
            min-height: 36px;
        }
        
        #sendBtn {
            background: var(--secondary);
            color: var(--white);
            margin-left: 8px;
            padding: 0 12px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            min-width: 60px;
        }
        
        .user-display {
            position: absolute;
            bottom: 2px;
            left: 4px;
            color: white;
            font-size: 9px;
            background: rgba(0,0,0,0.5);
            padding: 1px 4px;
            border-radius: 3px;
        }
        
        @media (max-width: 480px) {
            .header {
                padding: 8px 10px;
            }
            
            .header h2 {
                font-size: 16px;
            }
            
            .user-info {
                font-size: 12px;
            }
            
            .video-container {
                height: 70px;
            }
            
            .message {
                max-width: 90%;
                padding: 6px 10px;
            }
            
            .msg-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Video Chat</h2>
        <div class="user-info">
            <strong>{{ username }}</strong>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="video-container">
        <div class="video-frame">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="user-display">You</div>
        </div>
        <div class="video-frame">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="user-display">Partner</div>
        </div>
        <div class="video-controls">
            <button id="startCallBtn">Start</button>
            <button id="endCallBtn">End</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-container" id="chatContainer">
            <!-- Messages appear here -->
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." autocapitalize="sentences">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const username = "{{ username }}";
        let localStream;
        
        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startCallBtn = document.getElementById('startCallBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        
        // Disable zooming
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            setInterval(loadMessages, 2000);
            
            // Prevent keyboard from zooming on mobile
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                document.addEventListener('focusin', () => {
                    window.scrollTo(0, 0);
                });
            }
        });
        
        // Message Functions
        function loadMessages() {
            fetch("/get_messages")
                .then(response => response.json())
                .then(messages => {
                    chatContainer.innerHTML = '';
                    messages.forEach(msg => {
                        const isSent = msg.sender === username;
                        const msgDiv = document.createElement('div');
                        msgDiv.className = isSent ? 'message sent' : 'message received';
                        
                        msgDiv.innerHTML = `
                            <div class="msg-header">
                                <strong>${msg.sender}</strong>
                                <span>${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        `;
                        
                        chatContainer.appendChild(msgDiv);
                    });
                    
                    // Auto-scroll if near bottom
                    const threshold = 100;
                    const shouldScroll = chatContainer.scrollTop > chatContainer.scrollHeight - chatContainer.clientHeight - threshold;
                    if (shouldScroll) {
                        setTimeout(() => {
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }, 50);
                    }
                });
        }
        
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            fetch("/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to send');
                messageInput.value = '';
                loadMessages();
            })
            .catch(error => {
                console.error("Error:", error);
            });
            
            // Close keyboard on mobile after sending
            if ('virtualKeyboard' in navigator) {
                navigator.virtualKeyboard.hide();
            } else {
                messageInput.blur();
            }
        }
        
        // Video Call Functions
        async function startVideoCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 160, height: 120 }, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
                startCallBtn.style.display = 'none';
                endCallBtn.style.display = 'block';
            } catch (error) {
                console.error("Error accessing media:", error);
                alert("Please enable camera and microphone permissions");
            }
        }
        
        function endVideoCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject = null;
            }
            startCallBtn.style.display = 'block';
            endCallBtn.style.display = 'none';
        }
        
        // Event Listeners
        startCallBtn.addEventListener('click', startVideoCall);
        endCallBtn.addEventListener('click', endVideoCall);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        // Prevent double-tap zoom
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTap < 300) {
                e.preventDefault();
            }
            lastTap = now;
        }, { passive: false });
    </script>
</body>
</html>
