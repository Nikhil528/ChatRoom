<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Chat Room</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        header {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .user-info {
            background: #495057;
            padding: 8px;
            color: white;
            text-align: right;
        }
        .video-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: #fff;
        }
        .video-frame {
            flex: 1 1 300px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #f5f5f5;
        }
        .video-frame video {
            width: 100%;
            background: #000;
        }
        .video-header {
            padding: 8px;
            background: #e0e0e0;
            font-weight: bold;
            text-align: center;
        }
        .video-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            background: #fff;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #startCallBtn {
            background: #4CAF50;
            color: white;
        }
        #endCallBtn {
            background: #f44336;
            color: white;
        }
        .chat-container {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #fff;
            margin: 15px;
            border-radius: 8px;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
        }
        .sent {
            background: #d4edda;
            margin-left: 20%;
        }
        .received {
            background: #f8f9fa;
            margin-right: 20%;
        }
        .msg-header {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #fff;
        }
        #messageInput {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #sendBtn {
            background: #007bff;
            color: white;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Video Chat App</h1>
    </header>
    <div class="user-info">
        Logged in as: <strong>{{ username }}</strong> | 
        <a href="/logout" style="color: white;">Logout</a>
    </div>

    <div class="video-container">
        <div class="video-frame">
            <div class="video-header">You ({{ username }})</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-frame">
            <div class="video-header">Partner</div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="video-controls">
        <button id="startCallBtn">Start Call</button>
        <button id="endCallBtn" disabled>End Call</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <!-- Messages appear here -->
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const username = "{{ username }}";
        let localStream;
        let peerConnection;

        // DOM elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startCallBtn = document.getElementById('startCallBtn');
        const endCallBtn = document.getElementById('endCallBtn');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            setInterval(loadMessages, 2000);
        });

        // Message functions
        function loadMessages() {
            fetch("/get_messages")
                .then(response => response.json())
                .then(messages => {
                    chatContainer.innerHTML = '';
                    messages.forEach(msg => {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = msg.sender === username ? 'message sent' : 'message received';
                        msgDiv.innerHTML = `
                            <div class="msg-header">
                                <strong>${msg.sender}</strong>
                                <span>${msg.time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        `;
                        chatContainer.appendChild(msgDiv);
                    });
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                });
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            fetch("/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to send');
                messageInput.value = '';
                loadMessages();
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Failed to send message");
            });
        }

        // Video call functions
        startCallBtn.addEventListener('click', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                
                // Initialize WebRTC connection (simplified)
                // In a real app, you would:
                // 1. Create peer connection
                // 2. Exchange SDP offers/answers
                // 3. Handle ICE candidates
                
                startCallBtn.disabled = true;
                endCallBtn.disabled = false;
                
                console.log("Call started");
            } catch (error) {
                console.error("Error starting call:", error);
                alert("Could not access camera/microphone");
            }
        });

        endCallBtn.addEventListener('click', () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }
            if (remoteVideo.srcObject) {
                remoteVideo.srcObject = null;
            }
            
            startCallBtn.disabled = false;
            endCallBtn.disabled = true;
            
            console.log("Call ended");
        });

        // Send message on Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
