<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Room</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="dark:bg-gray-900 bg-gray-100 text-gray-900 dark:text-white transition-colors">
    <div class="flex flex-col h-screen">
        <header class="p-4 bg-white dark:bg-gray-800 shadow flex justify-between items-center">
            <h2 class="text-xl font-semibold">Chat Room</h2>
            <div class="flex space-x-4 items-center">
                <span>{{ username }}</span>
                <a href="{{ url_for('logout') }}" class="text-red-500">Logout</a>
                <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-300">🌙/☀️</button>
            </div>
        </header>

        <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col"></main>

        <div id="reply-to" class="hidden bg-blue-100 dark:bg-blue-900 p-3 mx-4 mb-2 rounded-xl flex justify-between items-center">
            <span id="reply-text" class="text-sm italic"></span>
            <button type="button" onclick="cancelReply()" class="text-gray-600">✖</button>
        </div>

        <form id="chat-form" class="p-4 bg-white dark:bg-gray-800 flex items-center space-x-2">
            <input type="text" id="message-input" placeholder="Type your message..." required
                class="flex-1 p-2 rounded-full border dark:border-gray-600 focus:outline-none">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-full hover:bg-blue-600">Send</button>
        </form>
    </div>

    <script>
        const username = "{{ username }}";
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
